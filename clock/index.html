<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>とけいをよもう！</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">

<!-- iOS ホーム画面追加対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="とけい">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    overflow: hidden;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    touch-action: manipulation;
  }

  html {
    height: -webkit-fill-available;
  }

  #start-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  #start-screen h1 {
    font-size: 3rem;
    color: #fff;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    margin-bottom: 1rem;
  }

  #start-screen p {
    font-size: 1.3rem;
    color: rgba(255,255,255,0.9);
    margin-bottom: 2rem;
  }

  .mode-buttons {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    align-items: center;
  }

  .mode-btn {
    font-size: 1.5rem;
    padding: 1rem 2.5rem;
    border: none;
    border-radius: 2rem;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    min-width: 280px;
  }

  .mode-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .mode-btn:active {
    transform: scale(0.98);
  }

  .mode-btn.read {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: #fff;
  }

  .mode-btn.set {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #fff;
  }

  .mode-btn.challenge {
    background: linear-gradient(135deg, #fa709a, #fee140);
    color: #fff;
  }

  .mode-btn.realtime {
    background: linear-gradient(135deg, #a8e063, #56ab2f);
    color: #fff;
  }

  .digital-time {
    margin-top: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
  }

  .digital-time .time-box {
    background: #1a1a1a;
    border-radius: 0.8rem;
    padding: 0.6rem 1.2rem;
    width: 100%;
    border: 3px solid #333;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 1px 3px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .digital-time .time-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
    pointer-events: none;
  }

  .digital-time .time-box.box-12h {
    border-color: #2a5a2a;
  }

  .digital-time .time-box.box-24h {
    border-color: #5a4a2a;
  }

  .digital-time .time-box-title {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 0.2rem;
  }

  .digital-time .digital-num {
    font-family: 'Courier New', monospace;
    font-size: 2.6rem;
    color: #33ff33;
    font-weight: bold;
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(51,255,51,0.5), 0 0 20px rgba(51,255,51,0.2);
    display: block;
  }

  .digital-time .ampm-badge {
    display: inline-block;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: bold;
    padding: 0.1rem 0.5rem;
    border-radius: 0.3rem;
    margin-right: 0.2rem;
    vertical-align: middle;
  }

  .digital-time .ampm-badge.am {
    background: rgba(255,200,0,0.2);
    color: #ffd54f;
    text-shadow: 0 0 6px rgba(255,213,79,0.4);
  }

  .digital-time .ampm-badge.pm {
    background: rgba(100,100,255,0.15);
    color: #90caf9;
    text-shadow: 0 0 6px rgba(144,202,249,0.4);
  }

  .digital-time .digital-label {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    font-weight: bold;
    display: block;
    margin-top: 0.2rem;
    letter-spacing: 1px;
  }

  .digital-time .digital-24h {
    font-family: 'Courier New', monospace;
    font-size: 2rem;
    color: #ffaa33;
    font-weight: bold;
    display: block;
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(255,170,51,0.5), 0 0 20px rgba(255,170,51,0.2);
  }

  .digital-time .digital-24h-suffix {
    font-family: sans-serif;
    font-size: 0.8rem;
    color: rgba(255,170,51,0.5);
    margin-left: 0.3rem;
    letter-spacing: 0;
  }

  #game-screen {
    display: none;
    text-align: center;
    animation: fadeIn 0.5s ease;
    width: 100%;
    max-width: 600px;
    padding: 0 1rem;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 0.5rem;
  }

  .back-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.5);
    color: #fff;
    font-size: 1rem;
    padding: 0.4rem 1rem;
    border-radius: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .back-btn:hover {
    background: rgba(255,255,255,0.4);
  }

  .score-display {
    color: #fff;
    font-size: 1.2rem;
    font-weight: bold;
  }

  .question-text {
    font-size: 1.6rem;
    color: #fff;
    margin-bottom: 0.8rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    min-height: 2.5rem;
  }

  .clock-container {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto 1rem;
  }

  canvas {
    border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  .choice-btn {
    font-size: 1.4rem;
    padding: 0.8rem 1rem;
    border: 3px solid rgba(255,255,255,0.5);
    border-radius: 1.5rem;
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: bold;
  }

  .choice-btn:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.03);
  }

  .choice-btn.correct {
    background: #2ecc71 !important;
    border-color: #27ae60 !important;
    animation: pop 0.4s ease;
  }

  .choice-btn.wrong {
    background: #e74c3c !important;
    border-color: #c0392b !important;
    animation: shake 0.4s ease;
  }

  .set-mode-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
  }

  .drag-hint {
    color: rgba(255,255,255,0.85);
    font-size: 1rem;
    font-weight: bold;
    animation: hintPulse 2s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  canvas.dragging {
    cursor: grabbing;
  }

  .step-toggle {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 0.3rem;
  }

  .step-btn {
    font-size: 0.95rem;
    padding: 0.4rem 1rem;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 1rem;
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }

  .step-btn.active {
    background: rgba(255,255,255,0.9);
    color: #764ba2;
    border-color: #fff;
  }

  .hand-controls {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hand-control {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .hand-control label {
    color: #fff;
    font-size: 1.1rem;
    font-weight: bold;
  }

  .hand-control .arrows {
    display: flex;
    gap: 0.5rem;
  }

  .arrow-btn {
    width: 50px;
    height: 50px;
    border: none;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    transition: transform 0.2s;
    font-weight: bold;
  }

  .arrow-btn:hover {
    transform: scale(1.1);
  }

  .arrow-btn:active {
    transform: scale(0.95);
  }

  .arrow-btn.hour-btn {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: #fff;
  }

  .arrow-btn.minute-btn {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #fff;
  }

  .submit-btn {
    font-size: 1.3rem;
    padding: 0.7rem 2rem;
    border: none;
    border-radius: 1.5rem;
    background: linear-gradient(135deg, #f5af19, #f12711);
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
    margin-top: 0.3rem;
  }

  .submit-btn:hover {
    transform: scale(1.05);
  }

  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 5rem;
    z-index: 100;
    pointer-events: none;
    background: rgba(255,255,255,0.85);
    border-radius: 2rem;
    padding: 0.3rem 1.5rem;
    text-shadow: none;
    white-space: nowrap;
  }

  .feedback.show {
    animation: feedbackPop 1s ease forwards;
  }

  .streak-display {
    color: #fee140;
    font-size: 1rem;
    font-weight: bold;
  }

  /* 結果画面 */
  #result-screen {
    display: none;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  #result-screen h2 {
    font-size: 2.5rem;
    color: #fff;
    margin-bottom: 1rem;
  }

  .result-stats {
    background: rgba(255,255,255,0.15);
    border-radius: 1.5rem;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    color: #fff;
    font-size: 1.3rem;
    line-height: 2;
  }

  .stars {
    font-size: 3rem;
    margin-bottom: 1rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  @keyframes feedbackPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
  }

  /* 紙吹雪 */
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 99;
    pointer-events: none;
  }

  @keyframes confettiFall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
  <h1>とけいをよもう！</h1>
  <p>じかんを よめるように なろう！</p>
  <div class="mode-buttons">
    <button class="mode-btn read" onclick="startGame('read')">
      よんでみよう
    </button>
    <button class="mode-btn set" onclick="startGame('set')">
      あわせてみよう
    </button>
    <button class="mode-btn challenge" onclick="startGame('challenge')">
      チャレンジ！（10もん）
    </button>
    <button class="mode-btn realtime" onclick="startGame('realtime')">
      いまの じかん
    </button>
  </div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">もどる</button>
    <div class="score-display">
      <span id="score-text"></span>
      <div class="streak-display" id="streak-text"></div>
    </div>
  </div>
  <div class="question-text" id="question"></div>
  <div class="clock-container">
    <canvas id="clock" width="300" height="300"></canvas>
  </div>
  <!-- よんでみようモード用 -->
  <div class="choices" id="choices"></div>
  <!-- あわせてみようモード用 -->
  <div class="set-mode-controls" id="set-controls">
    <div class="drag-hint" id="drag-hint">はりを ゆびで うごかせるよ！</div>
    <div class="step-toggle">
      <button class="step-btn active" id="step5-btn" onclick="setStepMode(5)">5ふん きざみ</button>
      <button class="step-btn" id="step1-btn" onclick="setStepMode(1)">1ぷん きざみ</button>
    </div>
    <div class="hand-controls">
      <div class="hand-control">
        <label>じかん（みじかいはり）</label>
        <div class="arrows">
          <button class="arrow-btn hour-btn" onclick="adjustHour(-1)">−</button>
          <button class="arrow-btn hour-btn" onclick="adjustHour(1)">＋</button>
        </div>
      </div>
      <div class="hand-control">
        <label>ふん（ながいはり）</label>
        <div class="arrows">
          <button class="arrow-btn minute-btn" id="min-down-btn" onclick="adjustMinute(-minuteStep)">−5</button>
          <button class="arrow-btn minute-btn" id="min-up-btn" onclick="adjustMinute(minuteStep)">＋5</button>
        </div>
      </div>
    </div>
    <button class="submit-btn" onclick="checkSetAnswer()">こたえあわせ</button>
  </div>
  <!-- いまのじかんモード用 -->
  <div class="digital-time" id="digital-time" style="display:none;"></div>
</div>

<!-- 結果画面 -->
<div id="result-screen">
  <div class="stars" id="result-stars"></div>
  <h2 id="result-title"></h2>
  <div class="result-stats" id="result-stats"></div>
  <div class="mode-buttons">
    <button class="mode-btn read" onclick="goBack()">もういちど あそぶ</button>
  </div>
</div>

<!-- フィードバック -->
<div class="feedback" id="feedback"></div>

<script>
// ゲーム状態
let gameMode = '';
let currentHour = 0;
let currentMinute = 0;
let correctAnswer = '';
let score = 0;
let totalQuestions = 0;
let streak = 0;
let maxQuestions = Infinity;
let isAnswering = false;
let minuteStep = 5; // 5分刻み or 1分刻み

// あわせてみようモード用
let setHour = 12;
let setMinute = 0;

// いまのじかんモード用
let realtimeTimer = null;

const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');
const centerX = 150;
const centerY = 150;
const radius = 140;

// 時間ごとの色
const hourColors = [
  '#e53935', // 12 - あか
  '#ff8a65', // 1  - うすだいだい
  '#66bb6a', // 2  - みどり
  '#2e7d32', // 3  - ふかみどり
  '#00897b', // 4  - あおみどり
  '#29b6f6', // 5  - みずいろ
  '#1565c0', // 6  - あお
  '#3949ab', // 7  - あいいろ
  '#7b1fa2', // 8  - むらさき
  '#c0ca33', // 9  - きみどり
  '#fdd835', // 10 - きいろ
  '#ff9800', // 11 - だいだい
];

// 時計を描画
function drawClock(hour, minute, second) {
  ctx.clearRect(0, 0, 300, 300);

  // === 外側のオレンジ分リング ===
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.fillStyle = '#ff9800';
  ctx.fill();
  ctx.strokeStyle = '#e65100';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 分リング内の区切り線
  for (let i = 0; i < 60; i++) {
    const angle = (i * 6 - 90) * Math.PI / 180;
    const isMajor = i % 5 === 0;
    ctx.beginPath();
    ctx.moveTo(
      centerX + radius * Math.cos(angle),
      centerY + radius * Math.sin(angle)
    );
    ctx.lineTo(
      centerX + (radius - 18) * Math.cos(angle),
      centerY + (radius - 18) * Math.sin(angle)
    );
    ctx.strokeStyle = isMajor ? '#e65100' : '#ffcc80';
    ctx.lineWidth = isMajor ? 1.5 : 0.5;
    ctx.stroke();
  }

  // 分の数字（5分刻み）
  const minuteNums = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30 - 90) * Math.PI / 180;
    const r = radius - 9;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(
      String(minuteNums[i]),
      centerX + r * Math.cos(angle),
      centerY + r * Math.sin(angle)
    );
  }

  // === 白い背景（分リングの内側） ===
  const innerWhite = radius - 18;
  ctx.beginPath();
  ctx.arc(centerX, centerY, innerWhite, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // === カラフルな時間セクター ===
  // 「Xじ」ゾーンは、数字Xの位置から次の数字の位置まで
  // 例: 「2じ」ゾーンは2の位置(60°)から3の位置(90°)まで
  const sectorOuter = innerWhite - 22;
  const sectorInner = 25;

  for (let i = 0; i < 12; i++) {
    const startAngle = (i * 30 - 90) * Math.PI / 180;
    const endAngle = ((i + 1) * 30 - 90) * Math.PI / 180;
    ctx.beginPath();
    ctx.arc(centerX, centerY, sectorOuter, startAngle, endAngle);
    ctx.arc(centerX, centerY, sectorInner, endAngle, startAngle, true);
    ctx.closePath();
    ctx.fillStyle = hourColors[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // === 大きな時間の数字（セクターの外側、白リング内） ===
  const hourNumR = innerWhite - 11;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 12; i++) {
    const angle = (i * 30 - 90) * Math.PI / 180;
    ctx.fillStyle = hourColors[i];
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(
      i === 0 ? '12' : String(i),
      centerX + hourNumR * Math.cos(angle),
      centerY + hourNumR * Math.sin(angle)
    );
  }

  // === 「Xじ」ラベル（セクター中央） ===
  const jiR = (sectorOuter + sectorInner) / 2 + 4;
  for (let i = 0; i < 12; i++) {
    // セクターの中央角度（数字iと数字i+1の中間）
    const midAngle = (i * 30 + 15 - 90) * Math.PI / 180;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    const label = (i === 0 ? '12' : String(i)) + 'じ';
    ctx.fillText(
      label,
      centerX + jiR * Math.cos(midAngle),
      centerY + jiR * Math.sin(midAngle)
    );
  }

  // === 中心の白い円 ===
  ctx.beginPath();
  ctx.arc(centerX, centerY, sectorInner - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // === 短針（じかん・赤） ===
  const hourAngle = ((hour % 12) * 30 + minute * 0.5 - 90) * Math.PI / 180;
  const hourLength = 55;
  // 針の影
  ctx.beginPath();
  ctx.moveTo(centerX + 1, centerY + 1);
  ctx.lineTo(
    centerX + hourLength * Math.cos(hourAngle) + 1,
    centerY + hourLength * Math.sin(hourAngle) + 1
  );
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.stroke();
  // 針本体
  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.lineTo(
    centerX + hourLength * Math.cos(hourAngle),
    centerY + hourLength * Math.sin(hourAngle)
  );
  ctx.strokeStyle = '#c62828';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.stroke();

  // === 長針（ふん・緑） ===
  const minuteAngle = (minute * 6 - 90) * Math.PI / 180;
  const minuteLength = 120;
  // 針の影
  ctx.beginPath();
  ctx.moveTo(centerX + 1, centerY + 1);
  ctx.lineTo(
    centerX + minuteLength * Math.cos(minuteAngle) + 1,
    centerY + minuteLength * Math.sin(minuteAngle) + 1
  );
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
  // 針本体
  ctx.beginPath();
  ctx.moveTo(centerX, centerY);
  ctx.lineTo(
    centerX + minuteLength * Math.cos(minuteAngle),
    centerY + minuteLength * Math.sin(minuteAngle)
  );
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // === 秒針（いまのじかんモード時のみ） ===
  if (second !== undefined) {
    const secondAngle = (second * 6 - 90) * Math.PI / 180;
    const secondLength = 115;
    ctx.beginPath();
    ctx.moveTo(
      centerX - 15 * Math.cos(secondAngle),
      centerY - 15 * Math.sin(secondAngle)
    );
    ctx.lineTo(
      centerX + secondLength * Math.cos(secondAngle),
      centerY + secondLength * Math.sin(secondAngle)
    );
    ctx.strokeStyle = '#ff5722';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // === 中心の丸 ===
  ctx.beginPath();
  ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
  ctx.fillStyle = second !== undefined ? '#ff5722' : '#333';
  ctx.fill();
}

// 時間のテキストを生成
function formatTime(hour, minute) {
  const h = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
  if (minute === 0) {
    return h + 'じ';
  }
  return h + 'じ ' + minute + 'ふん';
}

// 分刻みモード切替
function setStepMode(step) {
  minuteStep = step;
  document.getElementById('step5-btn').classList.toggle('active', step === 5);
  document.getElementById('step1-btn').classList.toggle('active', step === 1);
  document.getElementById('min-down-btn').textContent = '−' + step;
  document.getElementById('min-up-btn').textContent = '＋' + step;
  document.getElementById('min-down-btn').onclick = function() { adjustMinute(-minuteStep); };
  document.getElementById('min-up-btn').onclick = function() { adjustMinute(minuteStep); };
}

// ランダムな時間を生成
function randomTime() {
  const hour = Math.floor(Math.random() * 12) + 1;
  let minute;
  if (minuteStep === 5) {
    minute = Math.floor(Math.random() * 12) * 5;
  } else {
    minute = Math.floor(Math.random() * 60);
  }
  return { hour, minute };
}

// 間違いの選択肢を生成
function generateWrongAnswers(correctH, correctM) {
  const wrongs = new Set();
  const correctStr = formatTime(correctH, correctM);

  while (wrongs.size < 3) {
    const { hour, minute } = randomTime();
    const str = formatTime(hour, minute);
    if (str !== correctStr && !wrongs.has(str)) {
      wrongs.add(str);
    }
  }
  return Array.from(wrongs);
}

// 選択肢をシャッフル
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ゲーム開始
function startGame(mode) {
  gameMode = mode;
  score = 0;
  totalQuestions = 0;
  streak = 0;
  maxQuestions = mode === 'challenge' ? 10 : Infinity;

  // 前のリアルタイムタイマーをクリア
  if (realtimeTimer) {
    clearInterval(realtimeTimer);
    realtimeTimer = null;
  }

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  if (mode === 'realtime') {
    // いまのじかんモード
    document.getElementById('choices').style.display = 'none';
    document.getElementById('set-controls').style.display = 'none';
    document.getElementById('digital-time').style.display = 'block';
    document.getElementById('question').textContent = 'いまの じかん';
    document.getElementById('score-text').textContent = '';
    document.getElementById('streak-text').textContent = '';
    updateRealtimeClock();
    realtimeTimer = setInterval(updateRealtimeClock, 1000);
  } else {
    document.getElementById('digital-time').style.display = 'none';
    updateScore();
    nextQuestion();
  }
}

// スコア表示更新
function updateScore() {
  const scoreText = document.getElementById('score-text');
  const streakText = document.getElementById('streak-text');

  if (gameMode === 'challenge') {
    scoreText.textContent = score + ' / ' + totalQuestions + 'もん';
  } else {
    scoreText.textContent = 'せいかい: ' + score;
  }

  if (streak >= 3) {
    streakText.textContent = streak + 'れんぞく せいかい！';
  } else {
    streakText.textContent = '';
  }
}

// 次の問題
function nextQuestion() {
  if (totalQuestions >= maxQuestions) {
    showResult();
    return;
  }

  isAnswering = false;
  const { hour, minute } = randomTime();
  currentHour = hour;
  currentMinute = minute;
  correctAnswer = formatTime(hour, minute);

  if (gameMode === 'read' || gameMode === 'challenge') {
    // よんでみようモード
    document.getElementById('choices').style.display = 'grid';
    document.getElementById('set-controls').style.display = 'none';
    document.getElementById('question').textContent = 'いま なんじ？';

    drawClock(hour, minute);

    const wrongs = generateWrongAnswers(hour, minute);
    const allChoices = shuffle([correctAnswer, ...wrongs]);
    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    allChoices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(btn, choice);
      choicesDiv.appendChild(btn);
    });
  } else {
    // あわせてみようモード
    document.getElementById('choices').style.display = 'none';
    document.getElementById('set-controls').style.display = 'flex';
    document.getElementById('question').textContent =
      '「' + correctAnswer + '」に あわせよう！';

    // ランダムな初期位置
    setHour = Math.floor(Math.random() * 12) + 1;
    setMinute = Math.floor(Math.random() * (60 / minuteStep)) * minuteStep;
    // 正解と同じにならないようにする
    while (setHour === currentHour && setMinute === currentMinute) {
      setHour = Math.floor(Math.random() * 12) + 1;
      setMinute = Math.floor(Math.random() * (60 / minuteStep)) * minuteStep;
    }
    drawClock(setHour, setMinute);
  }
}

// 時針を調整
function adjustHour(delta) {
  setHour += delta;
  if (setHour > 12) setHour = 1;
  if (setHour < 1) setHour = 12;
  drawClock(setHour, setMinute);
}

// 分針を調整
function adjustMinute(delta) {
  setMinute += delta;
  if (setMinute >= 60) {
    setMinute = 0;
    setHour = setHour % 12 + 1;
  }
  if (setMinute < 0) {
    setMinute = 60 + delta; // delta is negative
    setHour = setHour - 1;
    if (setHour < 1) setHour = 12;
  }
  drawClock(setHour, setMinute);
}

// あわせてみようモードの答え合わせ
function checkSetAnswer() {
  if (isAnswering) return;
  isAnswering = true;
  totalQuestions++;

  const isCorrect = setHour === currentHour && setMinute === currentMinute;

  if (isCorrect) {
    score++;
    streak++;
    showFeedback(true);
  } else {
    streak = 0;
    showFeedback(false);
    // 正解を表示
    drawClock(currentHour, currentMinute);
    document.getElementById('question').textContent =
      'せいかいは「' + correctAnswer + '」だよ！';
  }

  updateScore();
  setTimeout(() => nextQuestion(), isCorrect ? 1200 : 2500);
}

// よんでみようモードの答え合わせ
function checkAnswer(btn, choice) {
  if (isAnswering) return;
  isAnswering = true;
  totalQuestions++;

  const isCorrect = choice === correctAnswer;

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    streak++;
    showFeedback(true);
  } else {
    btn.classList.add('wrong');
    streak = 0;
    showFeedback(false);

    // 正解のボタンを光らせる
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correctAnswer) {
        b.classList.add('correct');
      }
    });
  }

  // 全ボタン無効化
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.style.pointerEvents = 'none';
  });

  updateScore();
  setTimeout(() => nextQuestion(), isCorrect ? 1200 : 2500);
}

// フィードバック表示
function showFeedback(isCorrect) {
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.textContent = streak >= 3 ? 'すごい！' : 'まる！';
    fb.style.color = '#2ecc71';
    if (streak >= 5) spawnConfetti();
  } else {
    fb.textContent = 'おしい！';
    fb.style.color = '#e74c3c';
  }
  fb.className = 'feedback show';
  setTimeout(() => { fb.className = 'feedback'; }, 1000);
}

// 紙吹雪
function spawnConfetti() {
  const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#fee140', '#fa709a', '#2ecc71'];
  for (let i = 0; i < 30; i++) {
    const conf = document.createElement('div');
    conf.className = 'confetti';
    conf.style.left = Math.random() * 100 + 'vw';
    conf.style.background = colors[Math.floor(Math.random() * colors.length)];
    conf.style.width = (Math.random() * 8 + 6) + 'px';
    conf.style.height = (Math.random() * 8 + 6) + 'px';
    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    conf.style.animation = `confettiFall ${Math.random() * 2 + 1.5}s ease forwards`;
    conf.style.animationDelay = Math.random() * 0.5 + 's';
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 3000);
  }
}

// 結果画面
function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const pct = Math.round((score / totalQuestions) * 100);
  let starCount, title;

  if (pct === 100) {
    starCount = 3;
    title = 'かんぺき！ すばらしい！';
    spawnConfetti();
    setTimeout(spawnConfetti, 500);
  } else if (pct >= 70) {
    starCount = 2;
    title = 'よく できました！';
    spawnConfetti();
  } else if (pct >= 40) {
    starCount = 1;
    title = 'がんばったね！';
  } else {
    starCount = 0;
    title = 'もういちど ちょうせん しよう！';
  }

  document.getElementById('result-stars').textContent =
    (starCount >= 1 ? '⭐' : '☆') +
    (starCount >= 2 ? '⭐' : '☆') +
    (starCount >= 3 ? '⭐' : '☆');

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-stats').innerHTML =
    totalQuestions + 'もん ちゅう ' + score + 'もん せいかい！<br>' +
    'せいかいりつ: ' + pct + '%';
}

// === タッチ／ドラッグで針を動かす ===
let dragging = null; // 'hour' | 'minute' | null
let prevDragMinute = null; // ドラッグ中の前回の分値

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (300 / rect.width),
    y: (touch.clientY - rect.top) * (300 / rect.height)
  };
}

function onDragStart(e) {
  if (gameMode !== 'set' || isAnswering) return;
  e.preventDefault();

  const pos = getCanvasPos(e);
  const dx = pos.x - centerX;
  const dy = pos.y - centerY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > radius || dist < 12) return;

  // 各針の先端への距離を計算
  const hourAngle = ((setHour % 12) * 30 + setMinute * 0.5 - 90) * Math.PI / 180;
  const minuteAngle = (setMinute * 6 - 90) * Math.PI / 180;

  const hTipX = centerX + 55 * Math.cos(hourAngle);
  const hTipY = centerY + 55 * Math.sin(hourAngle);
  const mTipX = centerX + 120 * Math.cos(minuteAngle);
  const mTipY = centerY + 120 * Math.sin(minuteAngle);

  const distH = Math.sqrt((pos.x - hTipX) ** 2 + (pos.y - hTipY) ** 2);
  const distM = Math.sqrt((pos.x - mTipX) ** 2 + (pos.y - mTipY) ** 2);

  const threshold = 50;

  if (distM < threshold && distM <= distH) {
    dragging = 'minute';
  } else if (distH < threshold) {
    dragging = 'hour';
  } else if (dist > 65) {
    dragging = 'minute';
  } else {
    dragging = 'hour';
  }

  prevDragMinute = (dragging === 'minute') ? setMinute : null;
  canvas.classList.add('dragging');
}

function onDragMove(e) {
  if (!dragging || gameMode !== 'set' || isAnswering) return;
  e.preventDefault();

  const pos = getCanvasPos(e);
  // 中心からの角度（上が0°、時計回りに増加）
  let degrees = Math.atan2(pos.y - centerY, pos.x - centerX) * 180 / Math.PI + 90;
  if (degrees < 0) degrees += 360;

  if (dragging === 'minute') {
    // minuteStep刻みにスナップ
    let mins = Math.round(degrees / 6);
    mins = Math.round(mins / minuteStep) * minuteStep;
    if (mins >= 60) mins = 0;

    // 分針が0をまたいだら時針を連動
    if (prevDragMinute !== null) {
      if (prevDragMinute >= 45 && mins <= 10) {
        // 55→0 方向（時計回り）: 時間を進める
        setHour = setHour % 12 + 1;
      } else if (prevDragMinute <= 10 && mins >= 45) {
        // 0→55 方向（反時計回り）: 時間を戻す
        setHour = setHour - 1;
        if (setHour < 1) setHour = 12;
      }
    }
    prevDragMinute = mins;
    setMinute = mins;
  } else {
    // 時間にスナップ
    let hrs = Math.round(degrees / 30);
    if (hrs <= 0 || hrs > 12) hrs = 12;
    setHour = hrs;
  }

  drawClock(setHour, setMinute);
}

function onDragEnd(e) {
  if (dragging) {
    dragging = null;
    prevDragMinute = null;
    canvas.classList.remove('dragging');
  }
}

// タッチイベント
canvas.addEventListener('touchstart', onDragStart, { passive: false });
canvas.addEventListener('touchmove', onDragMove, { passive: false });
canvas.addEventListener('touchend', onDragEnd);
// マウスイベント（PC確認用）
canvas.addEventListener('mousedown', onDragStart);
canvas.addEventListener('mousemove', onDragMove);
canvas.addEventListener('mouseup', onDragEnd);
canvas.addEventListener('mouseleave', onDragEnd);

// いまのじかんモード更新
function updateRealtimeClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  drawClock(h, m, s);
  // デジタル表示
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  const ampm = h < 12 ? 'ごぜん' : 'ごご';
  const pad = (n) => String(n).padStart(2, '0');
  var badgeClass = h < 12 ? 'am' : 'pm';
  var badgeIcon;
  if (h >= 5 && h < 10) badgeIcon = '🌅';       // あさ
  else if (h >= 10 && h < 17) badgeIcon = '☀️';  // ひる
  else if (h >= 17 && h < 19) badgeIcon = '🌇';  // ゆうがた
  else badgeIcon = '🌙';                          // よる
  document.getElementById('digital-time').innerHTML =
    '<div class="time-box box-12h">' +
      '<span class="time-box-title">12じかん</span>' +
      '<span class="ampm-badge ' + badgeClass + '">' + badgeIcon + ' ' + ampm + '</span>' +
      '<span class="digital-num">' + pad(h12) + ':' + pad(m) + ':' + pad(s) + '</span>' +
      '<span class="digital-label">' + ampm + ' ' + h12 + 'じ ' + m + 'ふん ' + s + 'びょう</span>' +
    '</div>' +
    '<div class="time-box box-24h">' +
      '<span class="time-box-title">24じかん</span>' +
      '<span class="digital-24h">' + pad(h) + ':' + pad(m) + ':' + pad(s) + '<span class="digital-24h-suffix">（24h）</span></span>' +
      '<span class="digital-label">' + h + 'じ ' + m + 'ふん ' + s + 'びょう</span>' +
    '</div>';
}

// 戻る
function goBack() {
  if (realtimeTimer) {
    clearInterval(realtimeTimer);
    realtimeTimer = null;
  }
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}

// Service Worker 登録（オフライン対応）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
