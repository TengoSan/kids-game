<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キッズゲーム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Rounded Mplus 1c', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { text-align: center; padding: 2em; }
h1 { color: #fff; font-size: 2em; margin-bottom: 1em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.game-link { display: block; margin: 1em auto; padding: 1em 2em; font-size: 1.3em; border: none; border-radius: 16px; cursor: pointer; text-decoration: none; color: #333; font-weight: bold; width: 250px; transition: transform 0.1s; }
.game-link:active { transform: scale(0.95); }
.clock { background: linear-gradient(135deg, #74b9ff, #0984e3); color: #fff; }
.money { background: linear-gradient(135deg, #fdcb6e, #e17055); color: #fff; }
.bubble { background: linear-gradient(135deg, #48cae4, #0077b6); color: #fff; }
.reading { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
.yomimiru { background: linear-gradient(135deg, #FFB088, #FF7F42); color: #fff; }
.mathbattle { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
.seikatsu { background: linear-gradient(135deg, #f6d365, #fda085); color: #5d4037; }
.dice { background: linear-gradient(135deg, #1e3c72, #6dd5ed); color: #fff; }
</style>
</head>
<body>
<div class="container">
  <h1>キッズゲーム</h1>
  <a class="game-link clock" href="clock/">とけいゲーム</a>
  <a class="game-link money" href="money/">おかねゲーム</a>
  <a class="game-link bubble" href="bubble/">かずのバブル</a>
  <a class="game-link reading" href="reading/">ことばフラッシュ</a>
  <a class="game-link yomimiru" href="yomimiru/">よんでみよう</a>
  <a class="game-link mathbattle" href="math-battle/">たしざんひきざんバトル</a>
  <a class="game-link seikatsu" href="seikatsu/">せいかつリズム</a>
  <a class="game-link dice" href="dice/">サイコロころころ</a>
</div>
</body>
</html>
