<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GOLDEN SLOT</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e3d21">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; touch-action:manipulation;
  -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
body { background:#f7efdc; font-family:'M PLUS Rounded 1c',sans-serif; -webkit-font-smoothing:antialiased;
  display:flex; align-items:center; justify-content:center; }

/* モバイル対応: 560px 固定幅の盤面をビューポートに合わせて拡大縮小する */
#scaler { transform-origin:center center; }

@keyframes lamp{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes pop{0%{transform:scale(.4) rotate(-8deg)}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1)}}

button { font-family:inherit; }

/* 設定のセグメント切替ボタン */
.seg{ flex:1; height:44px; border-radius:10px; border:2px solid #d9a441; background:#08240f;
  color:#b8e6c4; font-family:'M PLUS Rounded 1c',sans-serif; font-size:16px; font-weight:700;
  cursor:pointer; transition:transform .05s; }
.seg:active{ transform:scale(.95); }
.seg.on{ background:linear-gradient(180deg,#ffd76a,#d9a441); color:#4a2c00; border-color:#8f6a1d; }
</style>
</head>
<body>
<div id="scaler">
<div style="width:560px;min-height:880px;background:#f7efdc;display:flex;align-items:center;justify-content:center;padding:20px 0;box-sizing:border-box">
  <div style="position:relative;width:500px;background:linear-gradient(180deg,#1c6b3c,#0e3d21);border:6px solid #d9a441;border-radius:28px;box-shadow:0 18px 40px rgba(20,60,35,.35), inset 0 2px 0 rgba(255,255,255,.25);padding:18px 20px 24px;box-sizing:border-box;display:flex;flex-direction:column;gap:14px">

    <!-- マーキー -->
    <div style="background:#0b2e18;border:3px solid #f0c75e;border-radius:16px;padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px;align-items:center">
      <div style="display:flex;gap:12px;justify-content:center">
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:0s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.15s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.3s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.45s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.6s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.75s"></span>
        <span style="width:10px;height:10px;border-radius:50%;background:#ffd54f;box-shadow:0 0 8px #ffd54f;animation:lamp 1.1s infinite;animation-delay:.9s"></span>
      </div>
      <div style="font-family:'Mochiy Pop One',sans-serif;font-size:32px;color:#ffd54f;text-shadow:0 2px 0 #7a4a00;letter-spacing:2px">GOLDEN SLOT</div>
    </div>

    <!-- 情報バー -->
    <div style="display:flex;gap:10px">
      <div style="flex:1;background:#08240f;border:2px solid #d9a441;border-radius:12px;padding:8px 4px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:#b8e6c4">コイン</div>
        <div id="v-credits" style="font-family:'Mochiy Pop One',sans-serif;font-size:24px;color:#ffd54f">100</div>
      </div>
      <div style="flex:1;background:#08240f;border:2px solid #d9a441;border-radius:12px;padding:8px 4px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:#b8e6c4">WIN</div>
        <div id="v-win" style="font-family:'Mochiy Pop One',sans-serif;font-size:24px;color:#ffd54f">0</div>
      </div>
      <div style="flex:1;background:#08240f;border:2px solid #d9a441;border-radius:12px;padding:8px 4px;text-align:center">
        <div style="font-size:13px;font-weight:700;color:#b8e6c4">れんしょう</div>
        <div style="font-family:'Mochiy Pop One',sans-serif;font-size:24px;color:#ffd54f"><span id="v-streak">0</span><span style="font-size:13px;color:#b8e6c4"> / 最高<span id="v-best">0</span></span></div>
      </div>
    </div>

    <!-- リール窓 -->
    <div id="reel-window" style="position:relative;background:#fdf6e3;border:5px solid #b9852f;border-radius:14px;padding:10px;display:flex;gap:10px;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.15) inset">
      <div style="width:132px;height:270px;overflow:hidden;border-radius:8px;background:linear-gradient(180deg,#e8dfc6 0%,#ffffff 22%,#ffffff 78%,#e8dfc6 100%);border:2px solid #d9a441">
        <div id="strip0" style="will-change:transform"></div>
      </div>
      <div style="width:132px;height:270px;overflow:hidden;border-radius:8px;background:linear-gradient(180deg,#e8dfc6 0%,#ffffff 22%,#ffffff 78%,#e8dfc6 100%);border:2px solid #d9a441">
        <div id="strip1" style="will-change:transform"></div>
      </div>
      <div style="width:132px;height:270px;overflow:hidden;border-radius:8px;background:linear-gradient(180deg,#e8dfc6 0%,#ffffff 22%,#ffffff 78%,#e8dfc6 100%);border:2px solid #d9a441">
        <div id="strip2" style="will-change:transform"></div>
      </div>
      <!-- ペイライン帯 -->
      <div style="position:absolute;left:10px;right:10px;top:100px;height:90px;background:rgba(217,164,65,.16);border-top:2px dashed rgba(185,60,30,.5);border-bottom:2px dashed rgba(185,60,30,.5);pointer-events:none"></div>
      <div style="position:absolute;left:-4px;top:50%;transform:translateY(-50%);color:#dc2626;font-size:22px;pointer-events:none">▶</div>
      <div style="position:absolute;right:-4px;top:50%;transform:translateY(-50%);color:#dc2626;font-size:22px;pointer-events:none">◀</div>
    </div>

    <!-- メッセージバー -->
    <div id="v-msg" style="background:#08240f;border:2px solid #d9a441;border-radius:10px;padding:10px;text-align:center;color:#ffef9e;font-size:18px;font-weight:700;min-height:26px">SPINをおしてスタート!</div>

    <!-- STOP ボタン行 -->
    <div style="display:flex;gap:14px">
      <button type="button" id="btn-stop0" style="flex:1;height:58px;border:none;border-bottom:5px solid #7f1010;border-radius:12px;background:radial-gradient(circle at 50% 30%,#ef5350,#b91c1c);color:#fff;font-family:'Mochiy Pop One',sans-serif;font-size:20px;cursor:pointer;opacity:.4">STOP ①</button>
      <button type="button" id="btn-stop1" style="flex:1;height:58px;border:none;border-bottom:5px solid #7f1010;border-radius:12px;background:radial-gradient(circle at 50% 30%,#ef5350,#b91c1c);color:#fff;font-family:'Mochiy Pop One',sans-serif;font-size:20px;cursor:pointer;opacity:.4">STOP ②</button>
      <button type="button" id="btn-stop2" style="flex:1;height:58px;border:none;border-bottom:5px solid #7f1010;border-radius:12px;background:radial-gradient(circle at 50% 30%,#ef5350,#b91c1c);color:#fff;font-family:'Mochiy Pop One',sans-serif;font-size:20px;cursor:pointer;opacity:.4">STOP ③</button>
    </div>

    <!-- メイン操作行 -->
    <div style="display:flex;gap:12px;align-items:stretch">
      <button type="button" id="btn-auto" style="flex:0 0 118px;height:64px;border-radius:14px;background:#0b2e18;border:3px solid #f0c75e;color:#ffd54f;font-family:'Mochiy Pop One',sans-serif;font-size:20px;cursor:pointer;opacity:1">AUTO</button>
      <button type="button" id="btn-spin" style="flex:1;height:64px;border:none;border-bottom:6px solid #8f6a1d;border-radius:32px;background:linear-gradient(180deg,#ffd76a,#d9a441);color:#4a2c00;font-family:'Mochiy Pop One',sans-serif;font-size:26px;letter-spacing:3px;cursor:pointer;opacity:1">SPIN</button>
      <button type="button" id="btn-sound" style="flex:0 0 76px;height:64px;border-radius:12px;background:#08240f;border:2px solid #d9a441;color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔊 ON</button>
    </div>

    <!-- 設定（とめかた・スピード） -->
    <div style="display:flex;flex-direction:column;gap:10px;background:#0b2e18;border:2px solid #d9a441;border-radius:12px;padding:10px 12px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="flex:0 0 84px;font-size:14px;font-weight:700;color:#b8e6c4">とめかた</span>
        <div style="flex:1;display:flex;gap:8px">
          <button type="button" class="seg" data-stop="snap">パッと</button>
          <button type="button" class="seg on" data-stop="slow">ゆっくり</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="flex:0 0 84px;font-size:14px;font-weight:700;color:#b8e6c4">スピード</span>
        <div style="flex:1;display:flex;gap:8px">
          <button type="button" class="seg" data-speed="900">おそい</button>
          <button type="button" class="seg on" data-speed="1500">ふつう</button>
          <button type="button" class="seg" data-speed="2400">はやい</button>
        </div>
      </div>
    </div>

    <!-- WIN オーバーレイ -->
    <div id="win-overlay" style="position:absolute;inset:0;z-index:5;display:none;align-items:center;justify-content:center;background:rgba(15,50,25,.55);border-radius:22px;pointer-events:none">
      <div id="win-card" style="animation:pop .5s;background:#ffd54f;border:4px solid #7a4a00;border-radius:20px;padding:22px 46px;text-align:center;box-shadow:0 0 40px rgba(255,213,79,.9)">
        <div style="font-family:'Mochiy Pop One',sans-serif;font-size:54px;color:#b91c1c;text-shadow:0 2px 0 #fff">WIN!</div>
        <div style="font-family:'Mochiy Pop One',sans-serif;font-size:30px;color:#4a2c00">+<span id="v-winpay">0</span></div>
      </div>
    </div>

  </div>
</div>
</div>

<script>
(function(){
  'use strict';

  // ===== 調整用パラメータ（プロトタイプの props に相当。設定として外出し）=====
  var CONFIG = {
    luck: 45,        // 当たりやすさ 0–100%（デフォルト45）
    autoSpeed: 900,  // AUTO の停止間隔 ms（デフォルト900）
  };

  // ===== リール幾何 =====
  var SYMS = ['🍒','🍋','🍇','🔔','⭐','7'];
  var CELL = 90, CYCLE = 540, STOP_MS = 650;
  var speed = 1500;       // ドラムの回転速度 px/s（スピード設定で変更）
  var stopMode = 'slow';  // 'snap'=パッと即止め / 'slow'=ゆっくり減速停止

  // pos を中央行に出すためのスクロールオフセット
  function yFor(p){ return CYCLE + CELL * ((p + 5) % 6); }

  // ===== 状態 =====
  var state = {
    credits: 100, win: 0, streak: 0, best: 0,
    msg: 'SPINをおしてスタート!',
    sound: true, reach: false, showWin: false,
    reels: [0,2,4].map(function(p){
      return { pos:p, y: yFor(p), mode:'done', from:0, to:0, t0:0 };
    }),
  };

  var _raf = 0, _last = 0, _timeouts = [], _ac = null;

  // ===== DOM 参照 =====
  var el = {
    credits: document.getElementById('v-credits'),
    win: document.getElementById('v-win'),
    streak: document.getElementById('v-streak'),
    best: document.getElementById('v-best'),
    msg: document.getElementById('v-msg'),
    reelWindow: document.getElementById('reel-window'),
    winOverlay: document.getElementById('win-overlay'),
    winCard: document.getElementById('win-card'),
    winPay: document.getElementById('v-winpay'),
    sound: document.getElementById('btn-sound'),
    spin: document.getElementById('btn-spin'),
    auto: document.getElementById('btn-auto'),
    strips: [0,1,2].map(function(i){ return document.getElementById('strip'+i); }),
    stops: [0,1,2].map(function(i){ return document.getElementById('btn-stop'+i); }),
  };

  // ストリップ（シンボル6種を5周＝30セル）を一度だけ生成
  el.strips.forEach(function(strip){
    var html = '';
    for(var k=0;k<5;k++){
      for(var s=0;s<SYMS.length;s++){
        html += '<div style="height:90px;display:flex;align-items:center;justify-content:center;font-size:56px;'
             + 'font-family:\'Mochiy Pop One\',sans-serif;color:#dc2626;border-bottom:1px solid #f0e6cc;box-sizing:border-box">'
             + SYMS[s] + '</div>';
      }
    }
    strip.innerHTML = html;
  });

  // ===== サウンド（Web Audio API、音源ファイル不要）=====
  function beep(freq, dur, type, vol){
    if(!state.sound) return;
    try{
      _ac = _ac || new (window.AudioContext || window.webkitAudioContext)();
      var ac = _ac, o = ac.createOscillator(), g = ac.createGain();
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.value = vol || 0.12;
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (dur || 0.08));
      o.connect(g); g.connect(ac.destination);
      o.start(); o.stop(ac.currentTime + (dur || 0.08));
    }catch(e){}
  }

  // ===== 描画（状態→DOM）=====
  function render(){
    el.credits.textContent = state.credits;
    el.win.textContent = state.win;
    el.streak.textContent = state.streak;
    el.best.textContent = state.best;
    el.msg.textContent = state.msg;

    // リール窓のリーチ発光
    el.reelWindow.style.boxShadow = state.reach
      ? '0 0 0 4px #ff5d8f, 0 0 34px 8px rgba(255,93,143,.75)'
      : '0 4px 10px rgba(0,0,0,.15) inset';

    // 回転中は SPIN / AUTO を薄く
    var busy = state.reels.some(function(r){ return r.mode==='spin' || r.mode==='stop'; });
    el.spin.style.opacity = busy ? 0.45 : 1;
    el.auto.style.opacity = busy ? 0.45 : 1;

    // 各リールの transform / blur / STOP ボタン濃度
    state.reels.forEach(function(r, i){
      el.strips[i].style.transform = 'translateY(' + (-Math.round(r.y)) + 'px)';
      el.strips[i].style.filter = r.mode==='spin' ? 'blur(3px)' : r.mode==='stop' ? 'blur(1px)' : 'none';
      el.stops[i].style.opacity = r.mode==='spin' ? 1 : 0.4;
    });

    // サウンドボタン
    el.sound.textContent = state.sound ? '🔊 ON' : '🔇 OFF';

    // WIN オーバーレイ
    el.winOverlay.style.display = state.showWin ? 'flex' : 'none';
    el.winPay.textContent = state.win;
  }

  // ===== rAF ループ（本物のドラム描画）=====
  function tick(ts){
    var dt = _last ? Math.min((ts - _last)/1000, 0.05) : 0.016;
    _last = ts;
    var any = false, landedIdx = [];
    state.reels.forEach(function(r, i){
      if(r.mode === 'spin'){
        any = true;
        r.y += speed * dt;
        if(r.y >= CYCLE*2) r.y -= CYCLE;   // ラップ
      } else if(r.mode === 'stop'){
        var t = Math.min(1, (ts - r.t0)/STOP_MS);
        var e = 1 - Math.pow(1 - t, 3);     // ease-out cubic 減速
        if(t >= 1){
          r.y = yFor(r.pos); r.mode = 'done';
          landedIdx.push(i);
        } else {
          any = true;
          r.y = r.from + (r.to - r.from) * e;
        }
      }
    });
    render();
    landedIdx.forEach(landed);
    if(any) _raf = requestAnimationFrame(tick);
    else _last = 0;
  }

  // ===== スピン開始 =====
  function spin(auto){
    if(state.reels.some(function(r){ return r.mode==='spin' || r.mode==='stop'; })) return; // ガード
    _timeouts.forEach(clearTimeout); _timeouts = [];

    // 掛け金10。10未満なら110に補充してから開始（実質リセット）
    state.credits = (state.credits < 10 ? 110 : state.credits) - 10;
    state.win = 0; state.showWin = false; state.reach = false;
    state.msg = auto ? 'AUTO! じゅんばんに とまるよ…' : 'STOPボタンで とめよう!';
    state.reels.forEach(function(r){ r.mode = 'spin'; });
    render();

    beep(440, 0.1);
    cancelAnimationFrame(_raf);
    _last = 0;
    _raf = requestAnimationFrame(tick);

    if(auto){
      var base = CONFIG.autoSpeed;
      [0,1,2].forEach(function(i){
        _timeouts.push(setTimeout(function(){ stop(i); }, base * (i+1)));
      });
    }
  }

  // ===== リール停止（抽選ロジック）=====
  function stop(i){
    var r = state.reels[i];
    if(r.mode !== 'spin') return;
    var luck = CONFIG.luck / 100;
    var done = state.reels.filter(function(x){ return x.mode==='done'; });

    var pos = Math.floor(Math.random()*6);
    if(done.length === 1){
      // 2番目: luck の確率で1番目と揃える（リーチ発生）
      if(Math.random() < luck) pos = done[0].pos;
    } else if(done.length === 2 && done[0].pos === done[1].pos){
      // 3番目: 揃っていれば luck の確率でWIN、外れなら隣（ニアミス）
      pos = Math.random() < luck ? done[0].pos : (done[0].pos + 1) % 6;
    }

    // パッと即止め: 減速せず即座に着地シンボルへスナップ
    if(stopMode === 'snap'){
      r.mode = 'done'; r.pos = pos; r.y = yFor(pos);
      render();
      beep(500 + i*120, 0.07);
      landed(i);
      return;
    }

    // ゆっくり減速: 現在位置から3セル以上先に着地
    var to = yFor(pos);
    while(to < r.y + CELL*3) to += CYCLE;
    r.mode = 'stop'; r.pos = pos; r.from = r.y; r.to = to; r.t0 = performance.now();
    render();
    beep(500 + i*120, 0.07);
  }

  // ===== 着地時の演出判定 =====
  function landed(i){
    var done = state.reels.filter(function(r){ return r.mode==='done'; });
    beep(320, 0.06, 'square', 0.14);

    if(done.length === 3){
      var a = state.reels[0].pos, b = state.reels[1].pos, c = state.reels[2].pos;
      if(a === b && b === c){
        var sym = SYMS[a];
        var payout = sym === '7' ? 200 : sym === '🔔' ? 80 : 40;
        state.streak += 1;
        state.best = Math.max(state.best, state.streak);
        state.credits += payout;
        state.win = payout;
        state.reach = false;
        state.showWin = true;
        state.msg = '🎉 ' + sym + ' がそろった! +' + payout + 'コイン!';
        render();
        // ファンファーレ
        [523,659,784,1047].forEach(function(f, k){
          _timeouts.push(setTimeout(function(){ beep(f, 0.16, 'triangle', 0.18); }, k*120));
        });
        _timeouts.push(setTimeout(function(){ state.showWin = false; render(); }, 2200));
      } else {
        state.reach = false; state.streak = 0; state.msg = 'ざんねん! もういっかい!';
        render();
        beep(170, 0.18, 'sawtooth', 0.07);
      }
    } else if(done.length === 2 && done[0].pos === done[1].pos){
      state.reach = true; state.msg = '✨ リーチ!! ドキドキ… ✨';
      render();
      beep(880, 0.25, 'triangle', 0.18);
    }
  }

  // ===== イベント =====
  el.spin.addEventListener('click', function(){ spin(false); });
  el.auto.addEventListener('click', function(){ spin(true); });
  el.stops.forEach(function(btn, i){ btn.addEventListener('click', function(){ stop(i); }); });
  el.sound.addEventListener('click', function(){ state.sound = !state.sound; render(); });

  // 設定: とめかた / スピード のセグメント切替
  var segStop = Array.prototype.slice.call(document.querySelectorAll('[data-stop]'));
  var segSpeed = Array.prototype.slice.call(document.querySelectorAll('[data-speed]'));
  function syncSeg(){
    segStop.forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-stop') === stopMode); });
    segSpeed.forEach(function(b){ b.classList.toggle('on', Number(b.getAttribute('data-speed')) === speed); });
  }
  segStop.forEach(function(b){
    b.addEventListener('click', function(){ stopMode = b.getAttribute('data-stop'); syncSeg(); });
  });
  segSpeed.forEach(function(b){
    b.addEventListener('click', function(){ speed = Number(b.getAttribute('data-speed')); syncSeg(); });
  });
  syncSeg();

  // ===== モバイル用スケーリング =====
  var scaler = document.getElementById('scaler');
  function fit(){
    // 実際の盤面の高さ（設定パネル込み）を測ってビューポートに収める
    var h = scaler.firstElementChild.offsetHeight || 880;
    var s = Math.min(window.innerWidth / 560, window.innerHeight / h, 1);
    scaler.style.transform = 'scale(' + s + ')';
  }
  window.addEventListener('resize', fit);
  fit();

  render();

  // ===== PWA =====
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
})();
</script>
</body>
</html>
